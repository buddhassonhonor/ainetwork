name: Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Initialize server (nginx config)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /var/www/ainetwork
            cat > /etc/nginx/sites-available/ainetwork << 'EOF'
            server {
                listen 80;
                server_name _;
                root /var/www/ainetwork;
                index index.html;
                location / {
                    try_files $uri $uri/ /index.html;
                }
                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/javascript;
            }
            EOF
            ln -sf /etc/nginx/sites-available/ainetwork /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx
            echo "✅ Nginx initialized"

      - name: Deploy dist to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: "/var/www/ainetwork"
          strip_components: 1
          rm: true

      - name: Reload Nginx after deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            systemctl reload nginx
            echo "✅ Deployment complete! Site live at http://${{ secrets.SERVER_HOST }}"
